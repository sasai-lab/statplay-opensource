<div class="panel">
    <div class="controls">
      <div class="ctrl"><label><span data-lang="ja">&#x03BC; (平均)</span><span data-lang="en">&#x03BC; (mean)</span> = <span class="val" id="nMuVal">0</span></label>
        <input type="range" id="nMu" min="-4" max="4" step="0.1" value="0">
      </div>
      <div class="ctrl"><label><span data-lang="ja">&#x03C3; (標準偏差)</span><span data-lang="en">&#x03C3; (std dev)</span> = <span class="val" id="nSdVal">1</span></label>
        <input type="range" id="nSd" min="0.3" max="3" step="0.1" value="1">
      </div>
      <div class="ctrl"><label><span data-lang="ja">区間 [a,b] : a</span><span data-lang="en">Interval [a,b] : a</span> = <span class="val" id="nAVal">-1</span></label>
        <input type="range" id="nA" min="-5" max="5" step="0.1" value="-1">
      </div>
      <div class="ctrl"><label>b = <span class="val" id="nBVal">1</span></label>
        <input type="range" id="nB" min="-5" max="5" step="0.1" value="1">
      </div>
    </div>
    <canvas id="normalCanvas" aria-label="Normal distribution N(&#x03BC;,&#x03C3;&#xB2;) PDF" height="260" aria-busy="true"></canvas>
    <div class="info">
      <div>P(a &#x2264; X &#x2264; b)<strong id="nProb">&#x2014;</strong></div>
      <div>z-score (a)<strong id="nZa">&#x2014;</strong></div>
      <div>z-score (b)<strong id="nZb">&#x2014;</strong></div>
    </div>
    <div class="share-row">
      <button class="share-btn dl" data-share="normalCanvas" data-title="正規分布" data-title-en="Normal Distribution" data-kind="dl"><span data-lang="ja">&#x1F4BE; 画像保存</span><span data-lang="en">&#x1F4BE; Save image</span></button>
    </div>
  </div>
