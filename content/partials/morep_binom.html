<div class="panel">
      <div class="panel-title" data-lang="ja">二項分布 B(n, p)</div>
      <div class="use-case" data-lang="ja">いつ使う？ → コイン10回で表が何回出るか、不良品検査で100個中何個不良か</div>
      <div class="use-case" data-lang="en">When? &#x2192; How many heads in 10 coin flips; how many defects in 100 items</div>
      <div class="panel-title" data-lang="en">Binomial B(n, p)</div>
      <canvas id="binomCanvas" aria-label="Binomial distribution simulation" height="240" aria-busy="true"></canvas>
      <div class="controls">
        <div class="ctrl"><label data-lang="ja">試行回数 n</label><label data-lang="en">trials n</label><input id="binomN" type="range" min="1" max="50" step="1" value="20">
<span class="val" id="binomNVal">20</span></div>
        <div class="ctrl"><label data-lang="ja">成功確率 p</label><label data-lang="en">success p</label><input id="binomP" type="range" min="0.01" max="0.99" step="0.01" value="0.35">
<span class="val" id="binomPVal">0.35</span></div>
      </div>
      <div class="sec-bridge" data-lang="ja">n &#x2192; &#x221E; かつ np &#x2192; &#x03BB; で、二項はポアソンへ。</div>
      <div class="sec-bridge" data-lang="en">As n &#x2192; &#x221E; with np &#x2192; &#x03BB;, the binomial approaches Poisson.</div>
    </div>
