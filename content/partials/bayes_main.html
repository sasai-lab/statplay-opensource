<div class="panel">
    <div class="controls">
      <div class="ctrl">
        <label><span data-lang="ja">有病率 &#x2014; 1000人のうち何人が病気？</span><span data-lang="en">Prevalence &#x2014; how many of 1,000 are sick?</span> = <span class="val" id="bPdVal">10人 / 1000</span></label>
        <input type="range" id="bPd" min="0.001" max="0.5" step="0.001" value="0.01">
      </div>
      <div class="ctrl">
        <label><span data-lang="ja">感度 &#x2014; 病気の人を「陽性」と当てる割合</span><span data-lang="en">Sensitivity &#x2014; % of sick people the test correctly flags</span> = <span class="val" id="bSensVal">99%</span></label>
        <input type="range" id="bSens" min="0.5" max="0.999" step="0.001" value="0.99">
      </div>
      <div class="ctrl">
        <label><span data-lang="ja">特異度 &#x2014; 健康な人を「陰性」と判定する割合</span><span data-lang="en">Specificity &#x2014; % of healthy people correctly cleared</span> = <span class="val" id="bSpecVal">95%</span></label>
        <input type="range" id="bSpec" min="0.5" max="0.999" step="0.001" value="0.95">
      </div>
    </div>
    <canvas id="bayesCanvas" aria-label="Bayes theorem visualization" style="width:100%;display:block;height:380px" aria-busy="true"></canvas>
    <div id="bayesStory" class="bayes-story" data-lang="ja"></div>
    <div id="bayesStoryEn" class="bayes-story" data-lang="en"></div>
    <div class="info">
      <div><span data-lang="ja">陽性だった人が本当に病気の確率</span><span data-lang="en">If you tested +, chance you're sick</span><strong id="bPpv">&#x2014;</strong></div>
      <div><span data-lang="ja">陰性だった人が本当に健康な確率</span><span data-lang="en">If you tested NEG, chance you're healthy</span><strong id="bNpv">&#x2014;</strong></div>
      <div><span data-lang="ja">真陽性 TP（病気 &amp; 陽性）</span><span data-lang="en">True positives (sick &amp; tested +)</span><strong id="bTp">&#x2014;</strong></div>
      <div><span data-lang="ja">偽陽性 FP（健康なのに陽性）</span><span data-lang="en">False positives (healthy but tested +)</span><strong id="bFp">&#x2014;</strong></div>
    </div>
    <div class="share-row">
      <button class="share-btn dl" data-share="bayesCanvas" data-title="ベイズの定理" data-title-en="Bayes' Theorem" data-kind="dl"><span data-lang="ja">&#x1F4BE; 画像保存</span><span data-lang="en">&#x1F4BE; Save image</span></button>
    </div>
  </div>
