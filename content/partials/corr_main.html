<div class="panel" data-autorun="corrGen">
    <div class="controls">
      <div class="ctrl">
        <label><span data-lang="ja">目標 r</span><span data-lang="en">Target r</span>
          = <span class="val" id="corrTargetR">0.80</span>
        </label>
        <input type="range" id="corrR" min="-1" max="1" step="0.01" value="0.80" aria-label="Target r">
      </div>
      <div class="ctrl">
        <label><span data-lang="ja">点の数 n</span><span data-lang="en">Points n</span>
          = <span class="val" id="corrTargetN">50</span>
        </label>
        <input type="range" id="corrN" min="10" max="200" step="1" value="50" aria-label="Points n">
      </div>
      <button class="btn" id="corrGen"><span data-lang="ja">&#x25B6; 生成</span><span data-lang="en">&#x25B6; Generate</span></button>
      <button class="btn magenta" id="corrClear"><span data-lang="ja">&#x21BA; リセット</span><span data-lang="en">&#x21BA; Reset</span></button>
      <span class="click-hint"><span data-lang="ja">&#x2191; キャンバスをクリックで点を追加</span><span data-lang="en">&#x2191; Click canvas to add points</span></span>
    </div>
    <canvas id="corrCanvas" aria-label="散布図と相関係数。クリックで点を追加し、相関係数rの変化を観察する" data-aria-label-en="Scatter plot and correlation coefficient. Click to add points and watch r change" height="320" class="canvas-crosshair" aria-busy="true"></canvas>
    <div class="info">
      <div>n<strong id="corrNval">0</strong></div>
      <div><span data-lang="ja">相関係数 r</span><span data-lang="en">Correlation r</span><strong id="corrRval">&#x2014;</strong></div>
      <div>R&#x00B2;<strong id="corrR2val">&#x2014;</strong></div>
      <div><span data-lang="ja">共分散 Cov</span><span data-lang="en">Covariance</span><strong id="corrCov">&#x2014;</strong></div>
    </div>
    <div class="share-row">
      <button class="share-btn dl" data-share="corrCanvas" data-title="相関係数" data-title-en="Correlation" data-kind="dl"><span data-lang="ja">&#x1F4BE; 画像保存</span><span data-lang="en">&#x1F4BE; Save image</span></button>
    </div>
  </div>
