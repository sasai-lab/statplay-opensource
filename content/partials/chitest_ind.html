<div class="panel">
    <h3 data-lang="ja" style="color:var(--cyan);font-family:'Courier New',monospace;margin-bottom:6px">&#x25B6; &#x2461; 独立性検定 &#x2014; 2変数は独立か？</h3>
    <h3 data-lang="en" style="color:var(--cyan);font-family:'Courier New',monospace;margin-bottom:6px">&#x25B6; &#x2461; Test of Independence &#x2014; Are Two Variables Independent?</h3>

    <div style="color:var(--dim);font-family:'Courier New',monospace;font-size:11px;margin-bottom:6px"><span data-lang="ja">左側のセルをクリックして観測値を+1（Shift+クリックで&#x2212;1）</span><span data-lang="en">Click a cell on the left to add +1 (Shift+click for &#x2212;1)</span></div>
    <div class="controls" style="gap:6px;margin-bottom:6px">
      <div class="ctrl">
        <label>
          <span data-lang="ja">有意水準 &#x03B1;</span>
          <span data-lang="en">Significance &#x03B1;</span>
          = <span class="val" id="indAVal">0.05</span>
        </label>
        <input type="range" id="indA" min="0.01" max="0.10" step="0.01" value="0.05">
      </div>
      <button id="indReset" class="lang-toggle" style="padding:5px 12px;font-size:11px"><span data-lang="ja">&#x21BA; リセット</span><span data-lang="en">&#x21BA; Reset</span></button>
    </div>

    <canvas id="indCanvas" aria-label="独立性検定の可視化。セルをクリックして観測値を追加しχ²統計量の変化を観察" height="300" style="width:100%;display:block;cursor:crosshair" aria-busy="true"></canvas>

    <div class="info">
      <div><span data-lang="ja">総数 n</span><span data-lang="en">Total n</span> <strong id="indN">0</strong></div>
      <div><span data-lang="ja">検定統計量 &#x03C7;&#x00B2;</span><span data-lang="en">Test statistic &#x03C7;&#x00B2;</span> <strong id="indStat">&#x2014;</strong></div>
      <div><span data-lang="ja">自由度 df</span><span data-lang="en">df</span> <strong id="indDf">&#x2014;</strong></div>
      <div><span data-lang="ja">p値</span><span data-lang="en">p-value</span> <strong id="indP">&#x2014;</strong></div>
      <div><span data-lang="ja">判定</span><span data-lang="en">Decision</span> <strong id="indResult">&#x2014;</strong></div>
    </div>

    <div class="share-row">
      <button class="share-btn dl" data-share="indCanvas" data-title="独立性検定" data-title-en="Test of Independence" data-kind="dl"><span data-lang="ja">&#x1F4BE; 画像保存</span><span data-lang="en">&#x1F4BE; Save image</span></button>
    </div>
  </div>
