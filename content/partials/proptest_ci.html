<div class="panel">
  <h3 data-lang="ja" class="cy-head">&#x25B6; &#x2460; 母比率の区間推定</h3>
  <h3 data-lang="en" class="cy-head">&#x25B6; &#x2460; Confidence interval for a proportion</h3>

  <div class="controls">
    <div class="ctrl"><label><span data-lang="ja">標本サイズ n</span><span data-lang="en">Sample size n</span> = <span class="val" id="ptCiNVal">15</span></label>
      <input type="range" id="ptCiN" min="10" max="200" step="1" value="15" aria-label="Sample size n">
    </div>
    <div class="ctrl"><label><span data-lang="ja">標本比率 p&#x0302;</span><span data-lang="en">Sample proportion p&#x0302;</span> = <span class="val" id="ptCiPVal">0.50</span></label>
      <input type="range" id="ptCiP" min="0.01" max="0.99" step="0.01" value="0.50" aria-label="Sample proportion">
    </div>
    <div class="ctrl"><label><span data-lang="ja">信頼水準</span><span data-lang="en">Confidence level</span></label>
      <select id="ptCiLvl" aria-label="Confidence level">
        <option value="90" data-ja="90%" data-en="90%">90%</option>
        <option value="95" data-ja="95%" data-en="95%" selected>95%</option>
        <option value="99" data-ja="99%" data-en="99%">99%</option>
      </select>
    </div>
  </div>
  <canvas id="ptCiCanvas" aria-label="母比率の信頼区間の可視化。標本比率を中心に信頼区間がどう広がるかをインタラクティブに確認できる" data-aria-label-en="Confidence interval for a proportion. Interactively see how the interval widens or narrows around the sample proportion" class="canvas-aspect-16-9" aria-busy="true"></canvas>
  <div class="info">
    <div><span data-lang="ja">標準誤差 SE</span><span data-lang="en">Standard error SE</span><strong id="ptCiSE">&#x2014;</strong></div>
    <div><span data-lang="ja">信頼区間 下限</span><span data-lang="en">CI lower bound</span><strong id="ptCiLo">&#x2014;</strong></div>
    <div><span data-lang="ja">信頼区間 上限</span><span data-lang="en">CI upper bound</span><strong id="ptCiHi">&#x2014;</strong></div>
    <div><span data-lang="ja">誤差幅 E</span><span data-lang="en">Margin of error E</span><strong id="ptCiMoe">&#x2014;</strong></div>
  </div>
  <div class="share-row">
    <button class="share-btn dl" data-share="ptCiCanvas" data-title="母比率の区間推定" data-title-en="Proportion CI" data-kind="dl"><span data-lang="ja">&#x1F4BE; 画像保存</span><span data-lang="en">&#x1F4BE; Save image</span></button>
  </div>
</div>
